<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
font-family: Arial;
background-color: #f2f2f2;
text-align: center;
}

.container {
margin-top: 100px;
background: white;
padding: 20px;
width: 300px;
margin-left: auto;
margin-right: auto;
border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}

input {
width: 90%;
padding: 10px;
margin: 10px 0;
}

button {
padding: 10px 20px;
background: blue;
color: white;
border: none;
cursor: pointer;
}

a {
display: block;
margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
<h2>Login</h2>

<form method="POST">
<input type="text" name="username" placeholder="Enter Username" required>
<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>
</form>

<a href="/register">Don't have an account? Register</a>
</div>

</body>
</html>
